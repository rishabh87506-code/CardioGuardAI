<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.13/html-to-image.min.js" integrity="sha512-iZ2ORl595Wx6miw+GuadDet4WQbdSWS3JLMoNfY8cRGoEFy6oT3G9IbcrBeL6AfkgpA51ETt/faX6yLV+/gFJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
            }
            const screenshot = await htmlToImage.toPng(rootElement, {
              imagePlaceholder:
                "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
            });
            window.parent.postMessage({
              type: 'screenshotData',
              data: screenshot,
            }, '*');
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();
    </script>

<body id="artifacts-component-root-html">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CardioGuardAI = () => {
            const [heartRate, setHeartRate] = useState(72);
            const [spo2, setSpo2] = useState(98);
            const [bp, setBp] = useState({ sys: 120, dia: 80 });
            const [temp, setTemp] = useState(36.6);
            const [riskScore, setRiskScore] = useState(15);
            const [riskLevel, setRiskLevel] = useState('Low');
            const [alerts, setAlerts] = useState([]);
            const [ecgData, setEcgData] = useState([]);
            const [aiMessage, setAiMessage] = useState('');
            const [isMonitoring, setIsMonitoring] = useState(true);
            const [emergencyMode, setEmergencyMode] = useState(false);
            const canvasRef = useRef(null);

            // Generate realistic ECG wave
            const generateECG = (time) => {
                const t = time % 100;
                let value = 0;
                
                if (t < 10) value = 0;
                else if (t < 12) value = (t - 10) * 10;
                else if (t < 14) value = 20 - (t - 12) * 10;
                else if (t < 16) value = -(t - 14) * 15;
                else if (t < 18) value = -30 + (t - 16) * 15;
                else if (t < 35) value = Math.sin((t - 18) * 0.5) * 3;
                else if (t < 50) value = Math.sin((t - 35) * 0.3) * 5;
                else value = 0;
                
                return value + (Math.random() - 0.5) * 2;
            };

            // Simulate vital signs
            useEffect(() => {
                if (!isMonitoring) return;

                const interval = setInterval(() => {
                    const time = Date.now() / 100;
                    
                    // Normal variation
                    setHeartRate(prev => {
                        const variation = Math.random() * 4 - 2;
                        const newHR = Math.max(60, Math.min(100, prev + variation));
                        return Math.round(newHR);
                    });
                    
                    setSpo2(prev => Math.max(95, Math.min(100, prev + (Math.random() - 0.5))));
                    setTemp(prev => Number((prev + (Math.random() - 0.5) * 0.1).toFixed(1)));
                    
                    // ECG waveform
                    setEcgData(prev => {
                        const newData = [...prev, generateECG(time)];
                        return newData.slice(-150);
                    });
                    
                    // Risk calculation
                    const hrRisk = Math.abs(heartRate - 70) / 50;
                    const spo2Risk = (100 - spo2) / 10;
                    const calculatedRisk = Math.min(100, (hrRisk + spo2Risk) * 30);
                    
                    setRiskScore(Math.round(calculatedRisk));
                    
                    if (calculatedRisk < 20) setRiskLevel('Low');
                    else if (calculatedRisk < 60) setRiskLevel('Moderate');
                    else if (calculatedRisk < 85) setRiskLevel('High');
                    else setRiskLevel('Critical');

                }, 100);

                return () => clearInterval(interval);
            }, [isMonitoring, heartRate, spo2]);

            // Draw ECG
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || ecgData.length === 0) return;

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                ctx.fillStyle = '#0f172a';
                ctx.fillRect(0, 0, width, height);

                // Grid
                ctx.strokeStyle = 'rgba(34, 197, 94, 0.1)';
                ctx.lineWidth = 1;
                for (let i = 0; i < width; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, height);
                    ctx.stroke();
                }
                for (let i = 0; i < height; i += 20) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(width, i);
                    ctx.stroke();
                }

                // ECG line
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                ecgData.forEach((value, index) => {
                    const x = (index / ecgData.length) * width;
                    const y = height / 2 - value * 2;
                    
                    if (index === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                
                ctx.stroke();
            }, [ecgData]);

            // AI Agent interaction
            const callAIAgent = async (situation) => {
                setAiMessage('AI Agent thinking...');
                
                try {
                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-20250514",
                            max_tokens: 150,
                            messages: [{
                                role: "user",
                                content: `You are a compassionate AI medical assistant in CardioGuard AI. Patient vitals: HR ${heartRate}, SpO2 ${spo2}%, Risk: ${riskLevel}. ${situation}. Provide a brief, calming 2-sentence response in first person.`
                            }]
                        })
                    });

                    const data = await response.json();
                    const message = data.content?.[0]?.text || "I'm here to help. Stay calm.";
                    setAiMessage(message);
                } catch (error) {
                    setAiMessage("I'm monitoring your vitals. You're doing well. Stay calm and breathe.");
                }
            };

            const triggerAlert = (level) => {
                const alert = {
                    id: Date.now(),
                    time: new Date().toLocaleTimeString(),
                    level,
                    message: level === 'critical' 
                        ? '🚨 CRITICAL: Emergency services dispatched' 
                        : '⚠️ WARNING: Elevated risk detected'
                };
                setAlerts(prev => [alert, ...prev].slice(0, 5));
                
                if (level === 'critical') {
                    setEmergencyMode(true);
                    callAIAgent('Critical cardiac event detected. Emergency services contacted.');
                }
            };

            const simulateEvent = (type) => {
                if (type === 'normal') {
                    setHeartRate(72);
                    setSpo2(98);
                    setRiskScore(15);
                    setEmergencyMode(false);
                } else if (type === 'elevated') {
                    setHeartRate(120);
                    setSpo2(94);
                    setRiskScore(65);
                    triggerAlert('warning');
                    callAIAgent('Your heart rate is elevated. Please sit down and relax.');
                } else if (type === 'critical') {
                    setHeartRate(160);
                    setSpo2(88);
                    setRiskScore(95);
                    triggerAlert('critical');
                }
            };

            const getRiskColor = () => {
                if (riskScore < 20) return 'text-green-400';
                if (riskScore < 60) return 'text-yellow-400';
                if (riskScore < 85) return 'text-orange-400';
                return 'text-red-400';
            };

            return (
                <div className="min-h-screen p-4 bg-slate-900">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className={`glass rounded-2xl p-6 mb-4 ${emergencyMode ? 'border-2 border-red-500 animate-pulse' : ''}`}>
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                        <span className={emergencyMode ? 'text-red-500' : 'text-red-400'}>❤️</span>
                                        CardioGuard AI
                                        {emergencyMode && <span className="text-red-500 text-xl animate-pulse">🚨 EMERGENCY</span>}
                                    </h1>
                                    <p className="text-gray-400">Patient: Sarah Johnson • ID: CG-2026-0423</p>
                                </div>
                                <div className="text-right">
                                    <div className={`text-5xl font-bold ${getRiskColor()}`}>
                                        {riskScore}
                                    </div>
                                    <div className="text-gray-400">Risk Score</div>
                                    <div className={`text-lg font-semibold ${getRiskColor()}`}>
                                        {riskLevel} Risk
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Vital Signs Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                            <div className="glass rounded-xl p-6 text-center">
                                <div className="text-4xl mb-2">💓</div>
                                <div className="text-4xl font-bold text-pink-400">{heartRate}</div>
                                <div className="text-gray-400 text-sm">Heart Rate (BPM)</div>
                                <div className="text-xs text-gray-500 mt-1">Normal: 60-100</div>
                            </div>
                            
                            <div className="glass rounded-xl p-6 text-center">
                                <div className="text-4xl mb-2">🫁</div>
                                <div className="text-4xl font-bold text-blue-400">{spo2.toFixed(1)}%</div>
                                <div className="text-gray-400 text-sm">Blood Oxygen</div>
                                <div className="text-xs text-gray-500 mt-1">Normal: 95-100%</div>
                            </div>
                            
                            <div className="glass rounded-xl p-6 text-center">
                                <div className="text-4xl mb-2">🩺</div>
                                <div className="text-3xl font-bold text-purple-400">{bp.sys}/{bp.dia}</div>
                                <div className="text-gray-400 text-sm">Blood Pressure</div>
                                <div className="text-xs text-gray-500 mt-1">Normal: 120/80</div>
                            </div>
                            
                            <div className="glass rounded-xl p-6 text-center">
                                <div className="text-4xl mb-2">🌡️</div>
                                <div className="text-4xl font-bold text-orange-400">{temp}°C</div>
                                <div className="text-gray-400 text-sm">Temperature</div>
                                <div className="text-xs text-gray-500 mt-1">Normal: 36.5-37.5</div>
                            </div>
                        </div>

                        <div className="grid md:grid-cols-3 gap-4 mb-4">
                            {/* ECG Monitor */}
                            <div className="md:col-span-2 glass rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2">
                                    📊 Live ECG Monitor
                                    <span className="pulse text-green-400 text-sm">● Recording</span>
                                </h2>
                                <canvas 
                                    ref={canvasRef} 
                                    width="800" 
                                    height="200"
                                    className="w-full rounded-lg"
                                />
                            </div>

                            {/* AI Assistant */}
                            <div className="glass rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">🤖 AI Assistant</h2>
                                <div className="bg-blue-900 bg-opacity-30 rounded-lg p-4 mb-4 min-h-[120px]">
                                    <p className="text-blue-200 text-sm italic">
                                        {aiMessage || "I'm monitoring your vitals 24/7. Everything looks good!"}
                                    </p>
                                </div>
                                <button
                                    onClick={() => callAIAgent('Patient requested assistance')}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold"
                                >
                                    Talk to AI Agent
                                </button>
                            </div>
                        </div>

                        {/* Alerts & Controls */}
                        <div className="grid md:grid-cols-2 gap-4">
                            <div className="glass rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">🚨 Recent Alerts</h2>
                                <div className="space-y-2">
                                    {alerts.length === 0 ? (
                                        <div className="text-gray-500 text-center py-8">
                                            No alerts. All vitals normal.
                                        </div>
                                    ) : (
                                        alerts.map(alert => (
                                            <div 
                                                key={alert.id}
                                                className={`p-3 rounded-lg ${
                                                    alert.level === 'critical' 
                                                        ? 'bg-red-900 bg-opacity-40 border border-red-500' 
                                                        : 'bg-yellow-900 bg-opacity-40 border border-yellow-500'
                                                }`}
                                            >
                                                <div className="flex justify-between">
                                                    <span className="text-white text-sm">{alert.message}</span>
                                                    <span className="text-gray-400 text-xs">{alert.time}</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>

                            <div className="glass rounded-xl p-6">
                                <h2 className="text-xl font-bold text-white mb-4">⚙️ Simulation Controls</h2>
                                <div className="space-y-3">
                                    <button
                                        onClick={() => simulateEvent('normal')}
                                        className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold"
                                    >
                                        ✅ Normal Vitals
                                    </button>
                                    <button
                                        onClick={() => simulateEvent('elevated')}
                                        className="w-full bg-yellow-600 hover:bg-yellow-700 text-white py-3 rounded-lg font-semibold"
                                    >
                                        ⚠️ Elevated Heart Rate
                                    </button>
                                    <button
                                        onClick={() => simulateEvent('critical')}
                                        className="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-semibold"
                                    >
                                        🚨 Critical Event
                                    </button>
                                    <button
                                        onClick={() => setIsMonitoring(!isMonitoring)}
                                        className={`w-full ${isMonitoring ? 'bg-gray-600' : 'bg-blue-600'} hover:opacity-80 text-white py-3 rounded-lg font-semibold`}
                                    >
                                        {isMonitoring ? '⏸️ Pause' : '▶️ Resume'} Monitoring
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Emergency Contact */}
                        {emergencyMode && (
                            <div className="mt-4 glass rounded-xl p-6 border-2 border-red-500 bg-red-900 bg-opacity-20">
                                <h2 className="text-xl font-bold text-red-400 mb-2">🚑 Emergency Response Active</h2>
                                <div className="grid md:grid-cols-3 gap-4 text-white">
                                    <div>
                                        <div className="text-sm text-gray-400">Ambulance Status</div>
                                        <div className="text-lg font-semibold">En Route - ETA 4 min</div>
                                    </div>
                                    <div>
                                        <div className="text-sm text-gray-400">Location Shared</div>
                                        <div className="text-lg font-semibold">📍 123 Main St, Boston</div>
                                    </div>
                                    <div>
                                        <div className="text-sm text-gray-400">Emergency Contact</div>
                                        <div className="text-lg font-semibold">✅ Dr. Smith Notified</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Footer Stats */}
                        <div className="mt-4 grid grid-cols-3 gap-4">
                            <div className="glass rounded-lg p-4 text-center">
                                <div className="text-2xl font-bold text-green-400">24/7</div>
                                <div className="text-gray-400 text-sm">Active Monitoring</div>
                            </div>
                            <div className="glass rounded-lg p-4 text-center">
                                <div className="text-2xl font-bold text-blue-400">&lt;5s</div>
                                <div className="text-gray-400 text-sm">Alert Response</div>
                            </div>
                            <div className="glass rounded-lg p-4 text-center">
                                <div className="text-2xl font-bold text-purple-400">95%</div>
                                <div className="text-gray-400 text-sm">Prediction Accuracy</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CardioGuardAI />, document.getElementById('root'));
    </script>

</body></html>
