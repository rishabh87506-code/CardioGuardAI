services:
  - type: web
    name: cardioguard-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://cardioguardai.in,https://www.cardioguardai.in,https://cardioguardai.co.in,https://www.cardioguardai.co.in
    autoDeploy: true
